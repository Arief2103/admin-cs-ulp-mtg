<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Pekerjaan - CS ULP Mantingan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-active { background-color: #075E3D; color: white; }
    </style>
</head>
<body class="flex h-screen overflow-hidden bg-gray-50">

    <!-- SIDEBAR CONTAINER -->
    <div id="sidebar"></div>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col min-w-0 h-full overflow-hidden">
        
        <!-- NAVBAR CONTAINER -->
        <div id="navbar"></div>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-3xl font-black text-gray-900 tracking-tight">Tambah Pekerjaan</h1>
                    <p class="text-gray-400 font-medium">Delegasikan tugas spesifik ke tim cleaning service.</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- FORM INPUT -->
                <div class="lg:col-span-12">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-sm">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                            <!-- PILIH CLEANER -->
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest pl-2 mb-2 block">Pilih Petugas (Cleaner)</label>
                                <select id="select-cleaner" class="w-full h-14 px-6 bg-gray-50 border border-transparent rounded-2xl focus:bg-white focus:border-green-500 focus:outline-none transition-all appearance-none cursor-pointer">
                                    <option value="">-- Meload data petugas.. --</option>
                                </select>
                            </div>

                            <!-- JENIS LAPORAN -->
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest pl-2 mb-2 block">Kategori Pekerjaan</label>
                                <select id="select-category" class="w-full h-14 px-6 bg-gray-50 border border-transparent rounded-2xl focus:bg-white focus:border-green-500 focus:outline-none transition-all appearance-none cursor-pointer">
                                    <option value="Harian Pagi">Laporan Harian Pagi (08:00)</option>
                                    <option value="Harian Siang">Laporan Harian Siang (13:00)</option>
                                    <option value="Harian Sore">Laporan Harian Sore (16:00)</option>
                                    <option value="Mingguan">Laporan Mingguan</option>
                                    <option value="Bulanan">Laporan Bulanan</option>
                                    <option value="Weekend">Piket Weekend</option>
                                </select>
                            </div>
                        </div>

                        <!-- DESKRIPSI PEKERJAAN -->
                        <div class="mb-8">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest pl-2 mb-2 block">Deskripsi Tugas & Lokasi</label>
                            <textarea id="task-description" rows="4" placeholder="Contoh: Menyapu dan mengepel Lantai 2 (Ruang Manager, Ruang Rapat, Ruang Pegawai)" class="w-full p-6 bg-gray-50 border border-transparent rounded-3xl focus:bg-white focus:border-green-500 focus:outline-none transition-all resize-none"></textarea>
                        </div>

                        <div class="flex justify-end gap-4">
                            <button onclick="resetForm()" class="px-8 py-4 text-gray-400 font-bold hover:text-gray-600 transition-colors">Reset</button>
                            <button onclick="submitJob()" class="bg-[#075E3D] text-white px-10 py-4 rounded-2xl font-bold shadow-lg shadow-green-900/20 hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
                                <i data-lucide="send" class="w-5 h-5"></i>
                                Kirim Tugas
                            </button>
                        </div>
                    </div>
                </div>

                <!-- DAFTAR JOB TERAKHIR (DENGAN FILTER & GRUP) -->
                <div class="lg:col-span-12">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                        <h3 class="text-xl font-bold text-gray-900">Histori Penugasan</h3>
                        
                        <div class="flex items-center gap-3">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Filter Petugas:</label>
                            <select id="filter-user-jobs" onchange="loadRecentJobs()" class="h-10 px-4 bg-white border border-gray-100 rounded-xl text-xs font-bold text-gray-500 focus:outline-none shadow-sm min-w-[180px]">
                                <option value="all">Semua Petugas (Terbaru)</option>
                                <!-- Akan diisi otomatis -->
                            </select>
                        </div>
                    </div>
                    
                    <div id="jobs-list-container" class="space-y-6">
                        <!-- Tabel atau Grup Kategori akan dimuat di sini -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/jobs.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (window.lucide) {
                setTimeout(() => lucide.createIcons(), 100);
            }
        });
    </script>
</body>
</html>
