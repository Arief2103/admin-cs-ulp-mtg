<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CS ULP Mantingan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-active { background-color: #075E3D; color: white; }
    </style>
</head>
<body class="flex h-screen overflow-hidden bg-gray-50">

    <!-- SIDEBAR CONTAINER -->
    <div id="sidebar"></div>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col min-w-0 h-full overflow-hidden">
        
        <!-- NAVBAR CONTAINER -->
        <div id="navbar"></div>

        <!-- CONTENT AREA -->
        <div class="flex-1 overflow-y-auto p-8">
            
            <!-- CARDS GRID -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <!-- Card 1 -->
                <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="briefcase"></i></div>
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Total Pekerjaan</p>
                    <h3 id="stat-total-jobs" class="text-3xl font-black text-gray-900">0</h3>
                </div>
                <!-- Card 2 -->
                <a href="users.html" class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm hover:shadow-md hover:border-green-200 transition-all group">
                    <div class="w-12 h-12 bg-green-50 text-[#075E3D] rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"><i data-lucide="users"></i></div>
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Jumlah User</p>
                    <h3 id="stat-total-users" class="text-3xl font-black text-gray-900">0</h3>
                </a>
                <!-- Card 3 -->
                <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                    <div class="w-12 h-12 bg-purple-50 text-purple-600 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="check-circle"></i></div>
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Complete</p>
                    <h3 id="stat-complete" class="text-3xl font-black text-gray-900">0</h3>
                </div>
                <!-- Card 4 -->
                <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                    <div class="w-12 h-12 bg-orange-50 text-orange-600 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="clock"></i></div>
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Incomplete</p>
                    <h3 id="stat-incomplete" class="text-3xl font-black text-gray-900">0</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-8">
                <!-- MONITORING PER PETUGAS -->
                <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm">
                    <div class="flex items-center justify-between mb-8">
                        <div>
                            <h3 class="text-xl font-bold text-gray-900">Monitoring Kinerja Petugas</h3>
                            <p class="text-sm text-gray-400 mt-1">Status penyelesaian tugas real-time tiap personil</p>
                        </div>
                        <div class="flex gap-2">
                            <span class="flex items-center gap-1.5 text-[10px] font-bold text-gray-500 uppercase tracking-wider bg-gray-50 px-3 py-1.5 rounded-full"><span class="w-2 h-2 bg-green-500 rounded-full"></span> Selesai</span>
                            <span class="flex items-center gap-1.5 text-[10px] font-bold text-gray-500 uppercase tracking-wider bg-gray-50 px-3 py-1.5 rounded-full"><span class="w-2 h-2 bg-gray-300 rounded-full"></span> Belum</span>
                        </div>
                    </div>
                    
                    <div id="monitoring-grid" class="grid grid-cols-1 gap-8">
                        <!-- Chart per petugas dengan sub-kategori akan dimuat di sini -->
                        <div class="animate-pulse flex flex-col gap-6 p-8 border border-gray-100 rounded-3xl">
                            <div class="h-6 bg-gray-100 rounded w-1/4"></div>
                            <div class="grid grid-cols-3 md:grid-cols-6 gap-4">
                                <div class="aspect-square bg-gray-50 rounded-full"></div>
                                <div class="aspect-square bg-gray-50 rounded-full"></div>
                                <div class="aspect-square bg-gray-50 rounded-full"></div>
                                <div class="aspect-square bg-gray-50 rounded-full"></div>
                                <div class="aspect-square bg-gray-50 rounded-full"></div>
                                <div class="aspect-square bg-gray-50 rounded-full"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/dashboard.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (window.lucide) {
                setTimeout(() => lucide.createIcons(), 100);
            }
        });
    </script>
</body>
</html>
