<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CS ULP Mantingan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Space Grotesk', sans-serif; }
  </style>
</head>
<body class="bg-[#075E3D] text-white">

  <div class="relative min-h-screen flex flex-col overflow-hidden">
    
    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none select-none overflow-hidden pb-96">
      <div class="relative flex items-center justify-center">
        <!-- Subtle circular glow behind logo -->
        <div class="absolute w-[100vw] h-[100vw] bg-white/5 rounded-full blur-3xl"></div>
        <img src="assets/web-logo.png" alt="Logo" class="relative w-[70vw] md:w-[35vw] opacity-60">
      </div>
    </div>

    <!-- MSG TEXT -->
    <div class="relative flex-1 flex flex-col justify-end px-8 pb-12 z-10">
      <div class="max-w-xl">
        <h2 class="text-4xl font-light">Laporan <span class="font-bold italic">CS</span></h2>
        <h2 class="text-4xl font-light mb-6"><span class="font-bold border-b-4 border-white/30">PLN ULP Mantingan</span></h2>
        <p class="text-white/70 text-sm max-w-xs leading-relaxed">
          Catat, pantau, dan laporkan setiap pekerjaan kebersihan secara terstruktur dan akurat.
        </p>
      </div>
    </div>

    <!-- LOGIN BOX -->
    <div class="bg-white text-black rounded-t-[3rem] px-8 pt-12 pb-12 shadow-[0_-20px_50px_rgba(0,0,0,0.3)] z-20">
      <div class="max-w-md mx-auto">
        <div class="flex items-center gap-4 mb-8">
          <div class="w-14 h-14 bg-green-50 rounded-2xl flex items-center justify-center text-2xl">🟢</div>
          <div>
            <h3 class="text-2xl font-bold tracking-tight">Admin Login</h3>
            <p class="text-sm text-gray-400">Silakan masukkan akun Anda</p>
          </div>
        </div>

        <div class="space-y-4">
          <input id="email" type="email" placeholder="Masukkan Email" class="w-full h-14 px-5 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#075E3D] transition-all">
          <input id="password" type="password" placeholder="••••••••" class="w-full h-14 px-5 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#075E3D] transition-all">

          <button onclick="login()" class="w-full h-14 bg-[#075E3D] text-white rounded-2xl flex justify-between items-center px-8 hover:brightness-110 transition-all shadow-xl shadow-green-900/20 group">
            <span class="font-bold">Masuk Sekarang</span>
            <span class="group-hover:translate-x-1 transition-transform">➜</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
